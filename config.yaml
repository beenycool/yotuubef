# =============================================================================
# config.yaml — shared by ConfigManager and EnhancementOptimizer
# =============================================================================
# EnhancementOptimizer loads and atomically rewrites this entire file when it
# applies tuned parameters (see parameter_yaml_paths in
# src/processing/enhancement_optimizer.py). Keep sections it may update
# (audio, effects, text_overlay, video_processing) present so round-trips stay
# predictable.
#
# ConfigManager (src/config/settings.py) applies only a subset at runtime:
#   paths, database, video, video_processing, text_overlay, subtitles, effects,
#   looping, fallbacks, audio (+ nested audio.background_music.volume),
#   api/apis, content, and top-level "subreddits".
# Other sections (ai_features, channel_management, logging, optimization, etc.)
# are reserved for future wiring or documentation; env vars still override API
# paths where documented in settings.py.
# =============================================================================

api:
  nvidia_nim_api_key: ""
  nvidia_nim_model: "moonshotai/kimi-k2.6"
  nvidia_nim_alt_model: "minimaxai/minimax-m3"
  nvidia_nim_base_url: "https://integrate.api.nvidia.com/v1"
  nvidia_nim_rate_limit_rpm: 60
  ai_provider: "nvidia_nim"
  reddit_client_id: ""
  reddit_client_secret: ""
  reddit_user_agent: YouTubeShorts:v2.0:enhanced (by u/yourusername)
  youtube_api_key: ""
  youtube_client_secrets_file: youtube_credentials.json
  youtube_token_file: youtube_token.json
content:
  curated_subreddits:
  - Eve
  - HobbyDrama
  - speedrun
  - speedrun_drama
  - lostmedia
  - InternetMysteries
  - Defunctland
  hard_disallowed:
  - porn
  - pornographic
  - nsfw
  - xxx
  - sexual
  - nude
  - naked
  - self-harm
  demonetization_risk:
  - violence
  - gore
  - blood
  - weapon
  - drugs
  - gambling
  - adult content
  - 18 plus
  caution:
  - political
  - religion
  - conspiracy
  - misinformation
  - accident
audio:
  audio_enhancement:
    enable_limiter: true
    enable_noise_gate: true
    limiter_threshold: -2
    noise_gate_threshold: -40
  background_music:
    enable: true
    fade_in_duration: 2.0
    fade_out_duration: 2.0
    loop_if_short: true
    volume: 0.4
  sound_effects:
    apply_reverb: false
    enable: true
    normalize_levels: true
    volume: 0.7
database:
  ab_test_retention_days: 30
  cleanup_interval_hours: 24
  metrics_retention_days: 90
  optimization_history_retention: 50
  sqlite_db_path: data/youtube_shorts.db
paths:
  ab_test_results_dir: ab_test_results
  ai_models_cache_dir: ai_models_cache
  base_dir: .
  downloads_dir: downloads
  fonts_dir: fonts
  logs_dir: logs
  music_dir: music
  optimization_data_dir: optimization_data
  performance_metrics_dir: performance_metrics
  processed_dir: processed
  sound_effects_dir: sound_effects
  temp_dir: temp
  thumbnails_dir: thumbnails
tts:
  narrator_speaker: Ryan
  primary_service: elevenlabs
video_processing:
  audio_bitrate: 128k
  audio_codec: aac
  default_output_resolution:
  - 1080
  - 1920
  enable_auto_color_grading: true
  enable_dynamic_zoom: true
  enable_motion_blur_compensation: true
  enable_speed_optimization: true
  enable_speed_ramping: true
  max_file_size_mb: 500
  max_video_duration: 600
  min_video_duration: 5
  pixel_format: yuv420p
  speed_optimization_level: aggressive
  target_fps: 30
  video_bitrate: 5M
  video_codec: libx264
  video_quality_profile: speed
youtube:
  add_performance_hashtags: true
  auto_generate_description: true
  default_category: '22'
  default_privacy: public
  enable_comments: true
  enable_ratings: true
  include_enhancement_credits: true
  thumbnail_quality: 95
  upload_retry_count: 3
  upload_timeout_minutes: 10
