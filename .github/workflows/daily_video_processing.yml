name: Daily Video Processing

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at 00:00 UTC every day
    - cron: '0 1 * * *'  # Runs at 01:00 UTC every day
    - cron: '0 2 * * *'  # Runs at 02:00 UTC every day
  workflow_dispatch:  # Allows manual triggering

jobs:
  process-videos:
    runs-on: ubuntu-latest
    if: ${{ success() || failure() }}  # Run on both success and failure
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Secrets
      run: |
        echo "Checking required secrets..."
        if [ -n "${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}" ]; then
          echo "✅ YouTube credentials present"
        else
          echo "❌ YouTube credentials missing"
          exit 1
        fi
        
        if [ -n "${{ secrets.REDDIT_CLIENT_ID }}" ] && [ -n "${{ secrets.REDDIT_CLIENT_SECRET }}" ] && [ -n "${{ secrets.REDDIT_USER_AGENT }}" ]; then
          echo "✅ Reddit credentials present"
        else
          echo "❌ Reddit credentials missing"
          exit 1
        fi
        
        if [ -n "${{ secrets.ELEVENLABS_API_KEY }}" ]; then
          echo "✅ ElevenLabs API key present"
        else
          echo "❌ ElevenLabs API key missing"
          exit 1
        fi
        
        if [ -n "${{ secrets.GOOGLE_AI_API_KEY }}" ]; then
          echo "✅ Google AI API key present"
        else
          echo "❌ Google AI API key missing"
          exit 1
        fi
        
        if [ -n "${{ secrets.HUGGINGFACE_TOKEN }}" ]; then
          echo "✅ HuggingFace token present"
        else
          echo "❌ HuggingFace token missing"
          exit 1
        fi
        
        echo "All required secrets are present! 🎉"
        
    - name: Run video processing
      run: |
        python script.py CrazyFuckingVideos funny videos interestingasfuck mildlyinteresting mildlyinfuriating CasualUK BeAmazed cats Damnthatsinteresting chaoticgood
      env:
        # YouTube credentials (JSON format)
        YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        
        # Reddit API credentials
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        
        # ElevenLabs API key
        ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        
        # Google AI API key
        GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        
        # HuggingFace API token
        HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }} 