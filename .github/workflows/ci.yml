name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Ruff
        run: ruff check src tests --select E9,F63,F7,F82,E4,E7,W --ignore W291,W292,W293

      - name: Byte-compile Python sources
        run: python -m compileall -q src main.py test.py

      - name: Pytest
        # Temporary CI filter for environment-sensitive fallback audio tests.
        # TODO: Replace with explicit pytest marks/reasons in the tests themselves.
        run: pytest -k "not fallback_audio_fix and not video_processor_fallback_audio"
